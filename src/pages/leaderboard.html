<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スコアランキング</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000;
    --surface: #0e0e0e;
    --surface2: #181818;
    --border: #2a2a2a;
    --accent: #f0c040;
    --accent2: #e05a30;
    --text: #e8e8f0;
    --text-dim: #b0b0b0;
    --rank1: #f0c040;
    --rank2: #b0b8cc;
    --rank3: #c08050;
    --danger: #e03050;
    --green: #40c080;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    padding: 24px 16px;
  }

  /* ── Header ── */
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .header-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(2rem, 6vw, 3.6rem);
    letter-spacing: 0.06em;
    color: var(--accent);
    text-shadow: 0 0 30px rgba(240,192,64,0.4);
    line-height: 1;
  }

  .header-sub {
    font-size: 0.72rem;
    color: var(--text-dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .player-count {
    margin-left: auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.8rem;
    color: var(--text-dim);
  }

  .player-count span {
    color: var(--accent);
    font-weight: 700;
  }

  /* ── Controls ── */
  .controls {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .controls-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: flex-end;
  }

  .field-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    min-width: 120px;
  }

  label {
    font-size: 0.68rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  input[type="text"],
  input[type="number"],
  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    padding: 8px 12px;
    font-family: inherit;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  input:focus, select:focus {
    border-color: var(--accent);
  }

  select option { background: var(--surface2); }

  .btn {
    padding: 8px 18px;
    border: none;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 0.85rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s, opacity 0.2s;
    white-space: nowrap;
    align-self: flex-end;
  }

  .btn:active { transform: scale(0.97); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-primary   { background: var(--accent); color: #0a0a0f; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger    { background: var(--danger); color: #fff; }
  .btn-update    { background: var(--green); color: #0a0a0f; }

  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
    margin-bottom: 4px;
  }

  .tab {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    cursor: pointer;
    border: 1px solid transparent;
    transition: all 0.15s;
    color: var(--text-dim);
    background: transparent;
    font-family: inherit;
  }

  .tab.active {
    background: var(--accent);
    color: #0a0a0f;
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Table ── */
  .table-wrapper {
    overflow-x: auto;
    border-radius: 0;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }

  thead th {
    background: #3d2e1a;
    padding: 10px 16px;
    text-align: left;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
    user-select: none;
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    background: #000;
    transition: background 0.15s;
    cursor: grab;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #111; }
  tbody tr.dragging { opacity: 0.4; }
  tbody tr.drag-over { background: rgba(240,192,64,0.08); outline: 1px solid var(--accent); }

  td {
    padding: 0 16px;
    height: 32px;
    vertical-align: middle;
  }

  /* Rank cell */
  .rank-cell {
    width: 58px;
    font-size: 0.82rem;
    font-weight: 400;
    line-height: 1;
    text-align: center;
    color: var(--text-dim);
  }

  .rank-badge {
    display: inline-block;
  }

  .rank-1, .rank-2, .rank-3, .rank-n { background: none; color: var(--text-dim); }

  .drag-handle { display: none; }

  .player-cell { font-weight: 400; font-size: 0.82rem; color: var(--text-dim); }

  .score-cell {
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 400;
    letter-spacing: 0.02em;
    color: var(--text-dim);
  }

  .actions-cell { white-space: nowrap; }

  .btn-icon {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    width: 30px;
    height: 30px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.85rem;
    line-height: 1;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }

  .btn-icon:hover { border-color: var(--danger); color: var(--danger); }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 52px 20px;
    color: var(--text-dim);
    font-size: 0.85rem;
    letter-spacing: 0.05em;
  }

  .empty-state .empty-icon { font-size: 2.4rem; margin-bottom: 12px; opacity: 0.4; }

  /* Footer bar */
  .footer-bar {
    display: flex;
    justify-content: flex-end;
    margin-top: 14px;
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(10px);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 20px;
    font-size: 0.82rem;
    color: var(--text);
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* inline score edit */
  .score-input-inline {
    background: var(--bg);
    border: 1px solid var(--accent);
    border-radius: 4px;
    color: var(--accent);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    padding: 2px 6px;
    width: 90px;
    outline: none;
  }

  /* Confirm dialog */
  .dialog-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }
  .dialog-overlay.open { display: flex; }

  .dialog {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 28px 32px;
    max-width: 340px;
    width: 90%;
    text-align: center;
  }

  .dialog h3 { margin-bottom: 10px; font-size: 1.1rem; }
  .dialog p { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 20px; }
  .dialog-actions { display: flex; gap: 10px; justify-content: center; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">RANKING</div>
    <div class="header-sub">Score Challenge Leaderboard</div>
  </div>
  <div class="player-count">参加者 <span id="playerCount">0</span> 名</div>
</div>

<!-- Controls -->
<div class="controls">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('add')">＋ 新規登録</button>
    <button class="tab" onclick="switchTab('update')">↑ スコア更新</button>
  </div>

  <!-- Add tab -->
  <div class="tab-panel active" id="tab-add">
    <div class="controls-row">
      <div class="field-group">
        <label>プレイヤー名</label>
        <input type="text" id="addName" placeholder="例: viewer123" maxlength="30">
      </div>
      <div class="field-group" style="max-width:160px">
        <label>スコア</label>
        <input type="text" id="addScore" placeholder="例: 12345 / S+">
      </div>
      <button class="btn btn-primary" onclick="addPlayer()">登録</button>
    </div>
  </div>

  <!-- Update tab -->
  <div class="tab-panel" id="tab-update">
    <div class="controls-row">
      <div class="field-group">
        <label>プレイヤー</label>
        <select id="updateSelect">
          <option value="">-- 選択 --</option>
        </select>
      </div>
      <div class="field-group" style="max-width:160px">
        <label>新スコア</label>
        <input type="text" id="updateScore" placeholder="例: 12345 / S+">
      </div>
      <button class="btn btn-update" onclick="updateScore()">更新</button>
    </div>
  </div>
</div>

<!-- Table -->
<div class="table-wrapper">
  <table id="rankTable">
    <thead>
      <tr>
        <th style="width:52px">順位</th>
        <th>プレイヤー</th>
        <th>スコア</th>
        <th style="width:60px">削除</th>
      </tr>
    </thead>
    <tbody id="tableBody">
    </tbody>
  </table>
  <div id="emptyState" style="display:none"></div>
</div>

<div class="footer-bar">
  <button class="btn btn-danger" onclick="confirmReset()">⟳ リセット</button>
</div>

<!-- Confirm dialog -->
<div class="dialog-overlay" id="confirmDialog">
  <div class="dialog">
    <h3>⚠ リセット確認</h3>
    <p>全プレイヤーのデータを削除する。<br>この操作は元に戻せない。</p>
    <div class="dialog-actions">
      <button class="btn btn-secondary" onclick="closeDialog()">キャンセル</button>
      <button class="btn btn-danger" onclick="doReset()">リセット実行</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── State ──
  let players = []; // [{ id, name, score }]
  let nextId = 1;
  let dragSrcIdx = null;

  // ── Tab switching ──
  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['add','update'][i] === name));
    document.querySelectorAll('.tab-panel').forEach((p,i) => p.classList.toggle('active', ['add','update'][i] === name));
  }

  // ── Add ──
  function addPlayer() {
    const name = document.getElementById('addName').value.trim();
    const score = document.getElementById('addScore').value.trim();
    if (!name) { toast('プレイヤー名を入力してください'); return; }
    if (!score) { toast('スコアを入力してください'); return; }
    if (players.find(p => p.name === name)) { toast(`「${name}」はすでに登録済み`); return; }
    players.push({ id: nextId++, name, score });
    document.getElementById('addName').value = '';
    document.getElementById('addScore').value = '';
    render();
    toast(`${name} を登録した`);
  }

  // ── Update score ──
  function updateScore() {
    const sel = document.getElementById('updateSelect');
    const id = parseInt(sel.value);
    const score = document.getElementById('updateScore').value.trim();
    if (!id) { toast('プレイヤーを選択してください'); return; }
    if (!score) { toast('スコアを入力してください'); return; }
    const p = players.find(p => p.id === id);
    if (!p) return;
    p.score = score;
    document.getElementById('updateScore').value = '';
    render();
    toast(`${p.name} のスコアを ${score} に更新した`);
  }

  // ── Delete ──
  function deletePlayer(id) {
    const p = players.find(p => p.id === id);
    players = players.filter(p => p.id !== id);
    render();
    if (p) toast(`${p.name} を削除した`);
  }

  // ── Reset ──
  function confirmReset() {
    if (players.length === 0) { toast('すでにリストは空'); return; }
    document.getElementById('confirmDialog').classList.add('open');
  }
  function closeDialog() { document.getElementById('confirmDialog').classList.remove('open'); }
  function doReset() {
    players = []; nextId = 1;
    closeDialog();
    render();
    toast('リセットした');
  }

  // ── Render ──
  function render() {
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');
    const countEl = document.getElementById('playerCount');
    const sel = document.getElementById('updateSelect');

    countEl.textContent = players.length;
    empty.style.display = players.length === 0 ? 'block' : 'none';

    // Update select
    const prevVal = sel.value;
    sel.innerHTML = '<option value="">-- 選択 --</option>';
    players.forEach(p => {
      const o = document.createElement('option');
      o.value = p.id;
      o.textContent = `${p.name}  (${p.score})`;
      sel.appendChild(o);
    });
    if (prevVal) sel.value = prevVal;

    // Render rows (min 15 rows: fill remainder with empty rows)
    tbody.innerHTML = '';
    const MIN_ROWS = 15;
    const totalRows = Math.max(players.length, MIN_ROWS);
    for (let idx = 0; idx < totalRows; idx++) {
      const p = players[idx] || null;
      const rank = idx + 1;
      const tr = document.createElement('tr');
      tr.dataset.idx = idx;

      if (p) {
        tr.draggable = true;
        const rankClass = rank <= 3 ? `rank-${rank}` : 'rank-n';
        const medal = rank;
        tr.innerHTML = `
          <td class="rank-cell"><span class="rank-badge ${rankClass}">${medal}</span></td>
          <td class="player-cell"><span class="drag-handle" title="ドラッグで並び替え">⠿</span>${escHtml(p.name)}</td>
          <td class="score-cell" data-id="${p.id}" ondblclick="inlineEdit(this, ${p.id})">${escHtml(String(p.score))}</td>
          <td class="actions-cell"><button class="btn-icon" title="削除" onclick="deletePlayer(${p.id})">✕</button></td>
        `;

        tr.addEventListener('dragstart', e => {
          dragSrcIdx = idx;
          tr.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        tr.addEventListener('dragend', () => {
          tr.classList.remove('dragging');
          tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
        });
        tr.addEventListener('dragover', e => {
          e.preventDefault();
          tbody.querySelectorAll('tr').forEach(r => r.classList.remove('drag-over'));
          tr.classList.add('drag-over');
          e.dataTransfer.dropEffect = 'move';
        });
        tr.addEventListener('drop', e => {
          e.preventDefault();
          const destIdx = parseInt(tr.dataset.idx);
          if (dragSrcIdx === null || dragSrcIdx === destIdx) return;
          const moved = players.splice(dragSrcIdx, 1)[0];
          players.splice(destIdx, 0, moved);
          dragSrcIdx = null;
          render();
          toast('順位を移動した');
        });
      } else {
        // Empty row
        tr.innerHTML = `
          <td class="rank-cell" style="color:#333">${rank}</td>
          <td class="player-cell" style="color:transparent">-</td>
          <td class="score-cell" style="color:transparent">-</td>
          <td class="actions-cell"></td>
        `;
      }

      tbody.appendChild(tr);
    }
  }

  // ── Inline score edit (double-click) ──
  function inlineEdit(td, id) {
    const p = players.find(p => p.id === id);
    if (!p) return;
    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'score-input-inline';
    inp.value = p.score;
    td.textContent = '';
    td.appendChild(inp);
    inp.focus(); inp.select();
    function commit() {
      const v = inp.value.trim();
      if (v) { p.score = v; toast(`${p.name} のスコアを更新した`); }
      render();
    }
    inp.addEventListener('blur', commit);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { render(); }
    });
  }

  // ── Utils ──
  function escHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
  }

  // ── Enter key shortcuts ──
  document.getElementById('addScore').addEventListener('keydown', e => { if (e.key === 'Enter') addPlayer(); });
  document.getElementById('addName').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('addScore').focus(); });
  document.getElementById('updateScore').addEventListener('keydown', e => { if (e.key === 'Enter') updateScore(); });

  // Init
  render();
</script>
</body>
</html>
